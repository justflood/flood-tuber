path_talk_2_blink="  └ Frame B  –  Eyes Closed  [optional]"
path_talk_2_blink_tooltip="Frame B with eyes closed. Falls back to Blink Image if empty."
path_talk_3="Talking Frame C  –  Round / O  [optional]"
path_talk_3_tooltip="Third talking frame. If empty, the plugin only uses Frames A and B."
path_talk_3_blink="  └ Frame C  –  Eyes Closed  [optional]"
